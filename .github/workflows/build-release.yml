name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Add macOS universal target
        if: matrix.platform == 'mac'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup target add universal-apple-darwin

      - run: npm ci

      - name: Build macOS (.dmg)
        if: matrix.platform == 'mac'
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Build Windows (.exe)
        if: matrix.platform == 'windows'
        run: npm run tauri build

      - name: Collect macOS artifacts
        if: matrix.platform == 'mac'
        run: |
          mkdir -p release
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release/ 2>/dev/null || \
          cp src-tauri/target/release/bundle/dmg/*.dmg release/

      - name: Collect Windows artifacts
        if: matrix.platform == 'windows'
        run: |
          mkdir release
          copy src-tauri\target\release\bundle\nsis\*.exe release\

      - uses: actions/upload-artifact@v4
        with:
          name: meme-generator-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error
